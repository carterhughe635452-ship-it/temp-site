<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  background: linear-gradient(180deg, #0a0f1f, #111827);
  color: white;
  padding: 40px 20px;
}

/* LOGO */
.logo {
  width: 260px;
  max-width: 80%;
  border-radius: 12px;
  margin-bottom: 20px;

  animation: float 4s ease-in-out infinite,
             glow 2.5s infinite alternate;
}

/* TEXT */
h1 {
  font-size: 42px;
}

p {
  font-size: 18px;
  color: #9ca3af;
}

/* BUTTONS */
.buttons {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 20px;
}

.btn {
  padding: 14px 24px;
  font-size: 18px;
  border-radius: 10px;
  text-decoration: none;
  color: white;
  transition: 0.2s;
}

.btn:hover {
  transform: scale(1.05);
}

.discord {
  background: #5865F2;
}

.roblox {
  background: #e11d48;
}

/* ANIMATIONS */
@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-12px); }
  100% { transform: translateY(0px); }
}

@keyframes glow {
  from { filter: drop-shadow(0 0 10px #3b82f6); }
  to { filter: drop-shadow(0 0 25px #60a5fa); }
}

/* 📱 MOBILE */
@media (max-width: 600px) {
  h1 {
    font-size: 28px;
  }

  p {
    font-size: 16px;
  }

  .btn {
    width: 100%;
    max-width: 250px;
  }
}
</style>
