<!DOCTYPE html>
<html>
<head>
  <title>Blue & White Troll Tower</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
      text-align: center;
      padding: 40px 20px;
      overflow: hidden;
    }

    /* background glow pulsing */
    .bg {
      position: fixed;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(59,130,246,0.2), transparent);
      animation: pulse 1s infinite;
      z-index: -1;
    }

    @keyframes pulse {
      0% { opacity: 0.2; }
      50% { opacity: 0.5; }
      100% { opacity: 0.2; }
    }

    /* LOGO */
    .logo {
      width: 260px;
      max-width: 80%;
      border-radius: 12px;
      margin-bottom: 20px;
      animation: bounce 1s infinite;
    }

    @keyframes bounce {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    h1 {
      font-size: 40px;
      animation: textPulse 1s infinite;
    }

    @keyframes textPulse {
      0% { text-shadow: 0 0 5px #3b82f6; }
      50% { text-shadow: 0 0 20px #60a5fa; }
      100% { text-shadow: 0 0 5px #3b82f6; }
    }

    p {
      color: #9ca3af;
      margin-bottom: 20px;
    }

    /* BUTTONS */
    .buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }

    .btn {
      padding: 14px 26px;
      font-size: 18px;
      border-radius: 10px;
      text-decoration: none;
      color: white;
      transition: 0.2s;
    }

    .btn:hover {
      transform: scale(1.1);
    }

    .discord {
      background: #5865F2;
    }

    .roblox {
      background: #ef4444;
    }

    /* music button */
    .music {
      margin-top: 25px;
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }

    /* particles */
    .particle {
      position: absolute;
      width: 5px;
      height: 5px;
      background: white;
      border-radius: 50%;
      pointer-events: none;
    }

    /* mobile */
    @media (max-width: 600px) {
      h1 { font-size: 28px; }
      .btn { width: 100%; max-width: 250px; }
    }
  </style>
</head>

<body onclick="spawnParticles(event)">

<div class="bg"></div>

<img src="logo.png" class="logo">

<h1>Blue & White Troll Tower</h1>
<p>TRILLIUM x HARTTEK ⚡</p>

<div class="buttons">
  <a href="https://www.roblox.com/games/70738198047390/blue-and-white-troll-tower#!/store" target="_blank" class="btn roblox">
    🎮 Play Game
  </a>

  <a href="https://discord.gg/gQgDtUe6UF" target="_blank" class="btn discord">
    💬 Join Discord
  </a>
</div>

<!-- MUSIC -->
<iframe id="musicFrame" width="0" height="0" src="" allow="autoplay"></iframe>
<button class="music" onclick="startMusic()">🎧 Start Music</button>

<script>
function startMusic() {
  document.getElementById("musicFrame").src =
    "https://www.youtube.com/embed/lXpPH3j-wTA?autoplay=1&loop=1&playlist=lXpPH3j-wTA";
}

/* particles */
function spawnParticles(e) {
  for (let i = 0; i < 10; i++) {
    let p = document.createElement("div");
    p.className = "particle";
    p.style.left = e.clientX + "px";
    p.style.top = e.clientY + "px";

    let x = (Math.random() - 0.5) * 120;
    let y = (Math.random() - 0.5) * 120;

    document.body.appendChild(p);

    p.animate([
      { transform: "translate(0,0)", opacity: 1 },
      { transform: `translate(${x}px, ${y}px)`, opacity: 0 }
    ], { duration: 600 });

    setTimeout(() => p.remove(), 600);
  }
}
</script>

</body>
</html>
